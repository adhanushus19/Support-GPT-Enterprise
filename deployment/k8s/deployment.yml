apiVersion: apps/v1
kind: Deployment
metadata:
  name: supportgpt-backend
  labels:
    app: supportgpt-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: supportgpt-backend
  template:
    metadata:
      labels:
        app: supportgpt-backend
    spec:
      containers:
      - name: backend
        image: supportgpt-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: supportgpt-config
        resources:
          limits:
            cpu: "1.0"
            memory: 1Gi
          requests:
            cpu: "0.5"
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 20
          periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: supportgpt-service
spec:
  type: ClusterIP
  selector:
    app: supportgpt-backend
  ports:
  - port: 8000
    targetPort: 8000
    name: http
